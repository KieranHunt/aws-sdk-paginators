name: Update AWS SDK Paginators

on:
  schedule:
    - cron: "0 0 * * 1" # Every Monday at midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clone aws-sdk-java-v2 (shallow)
        run: git clone --depth 1 https://github.com/aws/aws-sdk-java-v2.git

      - name: Install dependencies
        run: bun install

      - name: Generate README
        run: bun run find-aws-sdk-paginators.ts

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update paginators list"
          git push
